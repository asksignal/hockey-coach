<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hockey Performance Coach</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#121212">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <!-- Скрытое поле для загрузки фото -->
  <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">

  <header>
    <h1>🏒 Hockey Coach</h1>
    <nav id="tabs">
      <button data-tab="profiles">Профили</button>
      <button data-tab="analysis">Анализ ФХР</button>
      <button data-tab="lines">Состав звеньев</button>
      <button data-tab="train">Тренировки</button>
    </nav>
    <div id="authBlock">
      <!-- Форма входа / регистрации -->
      <div id="authForm" style="display: none;">
        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPassword" placeholder="Пароль">
        <button id="signUpBtn">Регистрация</button>
        <button id="signInBtn">Войти</button>
      </div>
      <div id="userInfo" style="display: none;">
        <span id="userEmail"></span>
        <button id="logoutBtn" onclick="logout()">Выйти</button>
      </div>
    </div>
  </header>

  <main id="content"></main>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

  <script src="app.js"></script>
</body>
</html>
